<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inventory Tracking / რესურსების მართვა</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          },
          colors: {
            primary: '#3b82f6',
            secondary: '#0f172a',
            accent: '#f59e0b',
            danger: '#ef4444',
            success: '#10b981',
            surface: '#f8fafc',
            border: '#e2e8f0'
          },
          animation: {
            'fade-in': 'fadeIn 0.3s ease-out forwards',
            'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            'pulse-soft': 'pulseSoft 3s cubic-bezier(0.4, 0, 0.6, 1) infinite'
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            pulseSoft: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.8' },
            }
          }
        }
      }
    }
  </script>
  <style>
    /* Custom scrollbar for better aesthetics */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }

    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }

    /* Hide scrollbar for Chrome, Safari, Opera, Firefox and IE/Edge */
    .scrollbar-none::-webkit-scrollbar {
      display: none;
    }
    .scrollbar-none {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }

    /* Print-specific styles */
    @media print {

      body,
      html {
        background-color: white;
        -webkit-print-color-adjust: exact;
        print-color-adjust: exact;
        height: auto !important;
        overflow: visible !important;
      }

      body * {
        visibility: hidden;
      }

      .printable-area,
      .printable-area * {
        visibility: visible;
      }

      .printable-area {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: auto;
        overflow: visible !important;
        font-size: 8pt !important;
        zoom: 1;
      }

      .no-print,
      .no-print * {
        display: none !important;
      }

      table {
        width: 100% !important;
        border-collapse: collapse !important;
        table-layout: auto !important;
        word-wrap: break-word;
      }

      thead {
        display: table-header-group;
      }

      tr {
        page-break-inside: avoid;
      }

      th,
      td {
        border: 1px solid #ddd !important;
        padding: 4px !important;
        position: static !important;
        /* Override sticky positioning */
        background-color: white !important;
        color: black !important;
        box-shadow: none !important;
        width: auto !important;
        min-width: 0 !important;
        max-width: none !important;
      }

      td.bg-red-500 {
        background-color: white !important;
        color: black !important;
      }

      input {
        border: none !important;
        box-shadow: none !important;
        background: transparent !important;
        -webkit-appearance: none;
        -moz-appearance: none;
        appearance: none;
        padding: 0;
        text-align: center;
        color: black !important;
      }

      .print\:block {
        display: block !important;
      }

      .no-print-input {
        display: none !important;
      }

      .print-only-value {
        display: inline-block !important;
      }
    }

    /* Smart Fit Print Styles */
    @media print {
      @page {
        size: landscape;
        margin: 5mm;
      }

      .print-fit .printable-area {
        width: 100% !important;
        max-width: 100% !important;
        font-size: 9px !important;
        zoom: 0.55;
        overflow: visible !important;
      }

      .print-fit table {
        width: 100% !important;
        table-layout: auto !important;
      }

      .print-fit th,
      .print-fit td {
        padding: 1px !important;
        font-size: 8px !important;
      }
    }

    /* Multi Page Print Styles */
    @media print {
      .print-multi table {
        page-break-inside: auto;
      }

      .print-multi tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }

      .print-multi thead {
        display: table-header-group;
      }

      .print-multi tfoot {
        display: table-footer-group;
      }

      /* Ensure sticky headers don't mess up print */
      .print-multi th,
      .print-multi td {
        position: static !important;
        overflow: visible !important;
      }
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "rxjs": "https://esm.sh/rxjs@^7.8.2?conditions=es2015",

    "rxjs/ajax": "https://esm.sh/rxjs@^7.8.2/ajax?conditions=es2015",

    "rxjs/fetch": "https://esm.sh/rxjs@^7.8.2/fetch?conditions=es2015",
    "@angular/compiler": "https://esm.sh/@angular/compiler@^21.1.1?external=rxjs",
    "@angular/platform-browser": "https://esm.sh/@angular/platform-browser@^21.1.1?external=rxjs",
    "@angular/core": "https://esm.sh/@angular/core@^21.1.1?external=rxjs",
    "@angular/common": "https://esm.sh/@angular/common@^21.1.1?external=rxjs",
    "@angular/forms": "https://esm.sh/@angular/forms@^21.1.1?external=rxjs",
    "d3": "https://esm.sh/d3@^7.9.0?external=rxjs",
    "xlsx": "https://esm.sh/xlsx@^0.18.5?external=rxjs"
  }
}
</script>

</head>

<body class="bg-gray-50 text-slate-800 font-sans h-screen w-screen overflow-hidden print:h-auto print:w-auto print:overflow-visible print:bg-white">

</html>
